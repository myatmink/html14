<!DOCTYPE html>
<html>
<head>
    <title>Circle and Rectangle</title>
    </head>
    <body>

    <svg width="400" height="300">

        <!-- Rectangle -->
            <rect x="50" y="50" width="150" height="150"
                      fill="blue" stroke="black" stroke-width="4"/>

                          <!-- Circle (drawn after = appears on top) -->
                              <circle cx="180" cy="150" r="70"
                                          fill="yellow" stroke="red" stroke-width="6"/>

                                          </svg>

                                          </body>
                                          </html>
